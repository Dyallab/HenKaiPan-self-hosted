apiVersion: v1
kind: ConfigMap
metadata:
  name: henkaipan-config
  namespace: henkaipan
  labels:
    app.kubernetes.io/name: henkaipan
    app.kubernetes.io/component: api
data:
  # Server configuration
  PORT: "8080"
  PROMETHEUS_PORT: "9090"
  
  # Database connection (uses Kubernetes DNS)
  DATABASE_URL: "postgres://aspm:aspm@postgres:5432/aspm?sslmode=disable"
  
  # Redis connection
  REDIS_ADDR: "redis:6379"
  
  # CORS (adjust for your domain)
  CORS_ALLOWED_ORIGINS: "http://localhost:4321,http://localhost:4322"
  
  # Cookie security (set to true behind HTTPS)
  COOKIE_SECURE: "false"
  
  # AI Provider - Ollama (free, self-hosted)
  # Summary only in free tier; remediation requires license key
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_MODEL: "gemma4:e4b"
  AI_SUMMARY_PROVIDER: "ollama"
  
  # Optional: Email notifications
  # SMTP_HOST: "smtp.example.com"
  # SMTP_PORT: "587"
  # EMAIL_FROM: "aspm@example.com"
