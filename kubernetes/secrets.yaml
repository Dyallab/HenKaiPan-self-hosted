apiVersion: v1
kind: Secret
metadata:
  name: henkaipan-secrets
  namespace: henkaipan
  labels:
    app.kubernetes.io/name: henkaipan
    app.kubernetes.io/component: api
type: Opaque
stringData:
  # Required secrets - CHANGE THESE VALUES
  JWT_SECRET: "change-this-to-a-random-string-min-32-chars"
  SECRET_ENCRYPTION_KEY: "change-this-to-a-64-character-hex-string-0123456789abcdef"
  
  # Optional: Admin password (auto-generated UUID v4 if not set)
  # Only used on first run
  ADMIN_PASS: "change-this-admin-password"
  

  
  # Optional: AI Providers
  # OPENROUTER_API_KEY: "sk_your_key"
  # CF_ACCOUNT_ID: "your_account_id"
  # CF_API_TOKEN: "your_api_token"
  
  # Optional: Email notifications
  # SMTP_USERNAME: "your_smtp_username"
  # SMTP_PASSWORD: "your_smtp_password"
  
  # Optional: Webhook secret
  # WEBHOOK_SECRET: "your-webhook-secret"
