apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: henkaipan
  labels:
    app: henkaipan-worker
    app.kubernetes.io/name: henkaipan
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: henkaipan-worker
  template:
    metadata:
      labels:
        app: henkaipan-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/dyallab/henkaipan-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: henkaipan-config
            - secretRef:
                name: henkaipan-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
