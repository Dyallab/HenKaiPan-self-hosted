# Prometheus configuration for HenKaiPan ASPM
# Mount this file to /etc/prometheus/prometheus.yml in your Prometheus container

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "henkaipan-api"
    static_configs:
      - targets: ["api:9090"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "henkaipan-worker"
    static_configs:
      - targets: ["worker:9090"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 15s

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s
