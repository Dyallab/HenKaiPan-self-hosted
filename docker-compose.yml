# Common configuration anchors to avoid repetition
x-restart-policy: &restart_policy
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck_defaults
  # Docker uses more CPU with frequent healthchecks - see:
  # https://github.com/moby/moby/issues/39102
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-depends-on-healthy: &depends_on_healthy
  condition: service_healthy

x-depends-on-default: &depends_on_default
  condition: service_started

x-env-file: &env_file
  env_file: .env

x-security-opt: &security_opt
  security_opt:
    - no-new-privileges:true

x-cap-drop-all: &cap_drop_all
  cap_drop:
    - ALL

services:
  postgres:
    <<: [*restart_policy, *env_file, *security_opt, *cap_drop_all]
    image: postgres:17-alpine
    command:
      ["postgres", "-c", "shared_buffers=256MB", "-c", "max_connections=200"]
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    healthcheck:
      <<: *healthcheck_defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aspm} -d aspm"]
    shm_size: 256m
    networks:
      - henkaipan-net

  redis:
    <<: [*restart_policy, *env_file, *security_opt, *cap_drop_all]
    image: redis:8-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "512mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    healthcheck:
      <<: *healthcheck_defaults
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - henkaipan-net

  api:
    <<: [*restart_policy, *env_file, *security_opt, *cap_drop_all]
    image: ghcr.io/dyallab/henkaipan-api:latest
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      postgres:
        <<: *depends_on_healthy
      redis:
        <<: *depends_on_healthy
    healthcheck:
      <<: *healthcheck_defaults
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      start_period: 60s
    networks:
      - henkaipan-net

  worker:
    <<: [*restart_policy, *env_file, *security_opt, *cap_drop_all]
    image: ghcr.io/dyallab/henkaipan-worker:latest
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /tmp:/tmp
    security_opt:
      - no-new-privileges:true
      - seccomp:docker/seccomp-worker.json
    cap_add:
      - FOWNER
      - FSETID
      - DAC_OVERRIDE
      - CHOWN
      - SETUID
      - SETGID
    depends_on:
      postgres:
        <<: *depends_on_healthy
      redis:
        <<: *depends_on_healthy
    healthcheck:
      <<: *healthcheck_defaults
      test: ["CMD-SHELL", "echo 'worker healthy'"]
      start_period: 120s
    networks:
      - henkaipan-net

volumes:
  pgdata:
  redis-data:

networks:
  henkaipan-net:
    driver: bridge
